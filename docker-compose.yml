# docker-compose.yml — deploy local o en VPS (Oracle Cloud, etc).
#
# Levantar:  docker compose up -d --build
# Logs:      docker compose logs -f
# Detener:   docker compose down
# Restart:   docker compose restart
#
# El puerto 8501 SOLO se expone a 127.0.0.1 del host. Cloudflare Tunnel
# se conecta como outbound desde el mismo host a localhost:8501.
# Nada queda expuesto al internet público sin la cadena de Cloudflare.

services:
  finanzas:
    build: .
    image: mis-finanzas:latest
    container_name: mis-finanzas
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data:rw
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
